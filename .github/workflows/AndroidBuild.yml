name: 🚀 Android CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
        - staging

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true"
  JAVA_VERSION: '17'
  NDK_VERSION: '26.1.10909125'

jobs:
  # Lint and Code Analysis
  lint:
    name: 🔍 Lint & Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          
      - name: 🔧 Grant Execute Permission
        run: chmod +x ./gradlew
        
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: 📝 Setup Gradle Properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --stacktrace --info
        continue-on-error: true
        
      - name: 📊 Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 7
          if-no-files-found: warn

  # Unit Tests
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          
      - name: 🔧 Grant Execute Permission
        run: chmod +x ./gradlew
        
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: 📝 Setup Gradle Properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace --info
        continue-on-error: true
        
      - name: 📊 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7
          if-no-files-found: warn

  # Build Matrix
  build:
    name: 🏗️ Build APK (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint, test]
    if: always()
    
    strategy:
      matrix:
        build-type: [debug, release]
        
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          
      - name: 🔧 Grant Execute Permission
        run: chmod +x ./gradlew
        
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: 📱 Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false
          
      - name: 🔧 Configure Build Environment
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          
      - name: 🔑 Setup Release Keystore
        if: matrix.build-type == 'release' && secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/Ktimazstudio.keystore
        env:
          RELEASE_STORE_FILE: Ktimazstudio.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'Ktimazstudio.keystore' }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'ktimazstudio' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'ktimazstudio123' }}
          
      - name: 🏗️ Build ${{ matrix.build-type }} APK
        run: |
          if [ "${{ matrix.build-type }}" == "release" ]; then
            ./gradlew assembleRelease --stacktrace --info
          else
            ./gradlew assembleDebug --stacktrace --info
          fi
        env:
          RELEASE_STORE_FILE: ${{ matrix.build-type == 'release' && 'Ktimazstudio.keystore' || '' }}
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'Ktimazstudio.keystore' }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'ktimazstudio' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'ktimazstudio123' }}
          
      - name: 📱 Verify APK
        run: |
          echo "🔍 Looking for APK files..."
          find app/build/outputs -name "*.apk" -exec ls -la {} \; || echo "No APK files found"
          find app/build/outputs -type f -exec ls -la {} \; || echo "No output files found"
          
      - name: 📈 Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.build-type }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/mapping/**/*.txt
            app/build/reports/
          retention-days: 30
          if-no-files-found: warn

  # Instrumented Tests (Optional - only on main branch)
  instrumented-test:
    name: 🤖 Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        api-level: [30]
        
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          
      - name: 🔧 Grant Execute Permission
        run: chmod +x ./gradlew
        
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: 📝 Setup Gradle Properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
      - name: 📱 Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          
      - name: 🤖 Run Tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: Nexus 6
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          disk-size: 6000M
          disable-animations: true
          disable-spellchecker: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace
          
      - name: 📊 Upload Instrumented Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 7
          if-no-files-found: warn

  # Release Management
  release:
    name: 🎯 Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 📱 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: ./release-apk/
        continue-on-error: true
        
      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          echo "## 🚀 Ktimaz Studio Release" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📱 Build Information" >> release_notes.md
          echo "- **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> release_notes.md
          echo "- **Commit**: \`${{ github.sha }}\`" >> release_notes.md
          echo "- **Branch**: ${{ github.ref_name }}" >> release_notes.md
          echo "- **Workflow**: ${{ github.workflow }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🔒 Security" >> release_notes.md
          echo "- Enhanced native security module" >> release_notes.md
          echo "- Advanced anti-tampering protection" >> release_notes.md
          echo "- Biometric authentication support" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🎨 Features" >> release_notes.md
          echo "- Modern Material 3 UI" >> release_notes.md
          echo "- Compose-based architecture" >> release_notes.md
          echo "- Multi-language support" >> release_notes.md
          
      - name: 🎯 Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release_notes.md
          files: |
            ./release-apk/**/*.apk
            ./release-apk/**/*.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true

  # Notifications
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    
    steps:
      - name: 📊 Check Results
        id: results
        run: |
          echo "Checking job results..."
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "status=✅ Build Successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "status=❌ Build Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          else
            echo "status=⚠️ Build Completed with Issues" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi
          
      - name: 📧 Slack Notification
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "🏗️ Ktimaz Studio Build Pipeline",
              "attachments": [{
                "color": "${{ steps.results.outputs.color }}",
                "fields": [
                  {
                    "title": "Status",
                    "value": "${{ steps.results.outputs.status }}",
                    "short": true
                  },
                  {
                    "title": "Branch", 
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Actor",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "Event",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
                    "short": false
                  }
                ],
                "actions": [{
                  "type": "button",
                  "text": "View Build",
                  "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: 📱 Simple Status Update
        if: always()
        run: |
          echo "🏗️ Build Pipeline Completed"
          echo "📊 Status: ${{ steps.results.outputs.status }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🔗 View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Cleanup
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [notify, release]
    if: always()
    
    steps:
      - name: 🧹 Cleanup Build Artifacts
        run: |
          echo "🧹 Cleaning up temporary files..."
          echo "✅ Cleanup completed"
