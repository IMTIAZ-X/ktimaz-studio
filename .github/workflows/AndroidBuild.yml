name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Create gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # FIXED: Create keystore with correct credentials matching build.gradle.kts
      - name: Create release keystore
        run: |
          mkdir -p app/
          keytool -genkey -v \
            -keystore app/Ktimazstudio.keystore \
            -storepass ktimazstudio123 \
            -alias ktimazstudio \
            -keypass ktimazstudio123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "C=US, O=Ktimaz Studio, CN=Ktimaz Studio"

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # FIXED: Use correct keystore environment variables
      - name: Build Release APK
        env:
          RELEASE_STORE_FILE: app/Ktimazstudio.keystore
          RELEASE_STORE_PASSWORD: ktimazstudio123
          RELEASE_KEY_ALIAS: ktimazstudio
          RELEASE_KEY_PASSWORD: ktimazstudio123
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Details" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            DEBUG_SIZE=$(ls -lah app/build/outputs/apk/debug/*.apk | awk '{print $5}')
            echo "- Debug APK size: $DEBUG_SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f app/build/outputs/apk/release/*.apk ]; then
            RELEASE_SIZE=$(ls -lah app/build/outputs/apk/release/*.apk | awk '{print $5}')
            echo "- Release APK size: $RELEASE_SIZE" >> $GITHUB_STEP_SUMMARY
          fi
